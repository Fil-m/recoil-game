<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recoil Gun — Браузерна гра</title>
    <meta name="description" content="Керуйте пістолетом за допомогою фізики віддачі. Летіть, крутіться, знищуйте ворогів!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100vh;
            height: 100dvh;
            margin: auto;
        }
        @media (max-width: 700px) {
            #game-wrapper { max-width: 100%; }
            .stats { font-size: 11px !important; }
            .hp-bar-wrap { width: 100px !important; }
        }

        canvas {
            display: none;
            width: 100%;
            height: 100%;
            background: #87CEEB;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.3);
            touch-action: none;
        }

        /* ─── Screens ─── */
        .screen {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-radius: 8px;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }
        .screen.active { display: flex; }

        /* ─── Main Menu ─── */
        #main-menu {
            background: linear-gradient(160deg, #0d0d1a 0%, #1a0a2e 60%, #0d1a2e 100%);
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        #main-menu h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #7c3aed, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        #main-menu p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }
        .btn-row { display: flex; gap: 16px; }

        /* ─── Buttons ─── */
        .btn {
            padding: 18px 44px;
            font-size: 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
            letter-spacing: 0.5px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }
        .btn-primary:hover { box-shadow: 0 6px 28px rgba(0, 212, 255, 0.6); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.14); color: #fff; }

        /* ─── Settings Menu ─── */
        #settings-menu {
            background: linear-gradient(160deg, #0d0d1a 0%, #1a1a2e 100%);
            border: 1px solid rgba(100, 200, 255, 0.15);
            gap: 12px;
        }
        #settings-menu h2 {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            color: #00d4ff;
            margin-bottom: 8px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 520px;
            overflow-y: auto;
            padding: 10px;
        }
        @media (max-width: 600px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
            #main-menu h1 {
                font-size: 34px;
            }
            .btn {
                padding: 16px 32px;
                font-size: 18px;
                min-height: 52px;
            }
            .btn-row { gap: 12px; flex-direction: column; }
            #main-menu p { font-size: 13px; }
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .setting-row label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .setting-row input[type="number"] {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #00d4ff;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Orbitron', monospace;
            padding: 6px 10px;
            width: 100%;
            outline: none;
            text-align: center;
        }
        .setting-row input[type="number"]:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }
        .sound-row {
            grid-column: 1 / -1;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        .sound-row label { font-size: 13px; }
        .toggle {
            position: relative; width: 48px; height: 26px;
            background: #333; border-radius: 13px; cursor: pointer;
            transition: background 0.2s;
        }
        .toggle::after {
            content: ''; position: absolute;
            top: 3px; left: 3px;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            transition: transform 0.2s;
        }
        input[type="checkbox"]:checked + .toggle { background: #00d4ff; }
        input[type="checkbox"]:checked + .toggle::after { transform: translateX(22px); }
        input[type="checkbox"] { display: none; }

        /* ─── HUD ─── */
        #hud {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 12px 16px;
            pointer-events: none;
            z-index: 5;
        }
        #hud.active { display: block; }
        .stats {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 4px #000;
        }
        .hp-bar-wrap {
            margin-top: 6px;
            width: 160px;
            height: 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
        }
        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6b6b);
            border-radius: 3px;
            transition: width 0.1s;
        }
        .buffs-list {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .buff-tag {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ─── Tip text ─── */
        .tip {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div id="game-wrapper">

    <!-- Canvas -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div class="stats">Очки: 0 | Рівень: 1 | HP: 100</div>
        <div class="hp-bar-wrap"><div class="hp-bar" id="hp-bar" style="width:100%"></div></div>
        <div class="buffs-list" id="buffs-list"></div>
    </div>

    <!-- Головне меню -->
    <div id="main-menu" class="screen active">
        <h1>RECOIL GUN</h1>
        <p>Стріляй — летів. Крутись — маневруй.<br>Кожен постріл це і рух, і зброя.</p>
        <div class="btn-row">
            <button id="btn-play" class="btn btn-primary">▶ ГРАТИ</button>
            <button id="btn-settings" class="btn btn-secondary">⚙ НАЛАШТУВАННЯ</button>
        </div>
        <p class="tip">📱 Торкнись екрана — цілься та стріляй</p>
    </div>

    <!-- Меню налаштувань -->
    <div id="settings-menu" class="screen">
        <h2>НАЛАШТУВАННЯ</h2>
        <div class="settings-grid">

            <div class="setting-row">
                <label>Гравітація</label>
                <input type="number" id="slider-gravity" min="200" max="5000" step="50" value="1800">
            </div>

            <div class="setting-row">
                <label>Сила відштовхування</label>
                <input type="number" id="slider-recoil" min="100" max="4000" step="50" value="1000">
            </div>

            <div class="setting-row">
                <label>Крутний момент</label>
                <input type="number" id="slider-torque" min="1" max="60" step="1" value="12">
            </div>

            <div class="setting-row">
                <label>Тертя обертання</label>
                <input type="number" id="slider-damping" min="0" max="100" step="1" value="8">
            </div>

            <div class="setting-row sound-row">
                <label>🔊 Звук</label>
                <input type="checkbox" id="toggle-sound" checked>
                <label for="toggle-sound" class="toggle"></label>
            </div>

            <div class="setting-row" style="grid-column: 1 / -1; border-color: rgba(160,100,255,0.3); background: rgba(120,60,200,0.08);">
                <label style="color: rgba(180,130,255,0.8); letter-spacing: 1.5px;">⏱ СЛОУ-МО — Швидкість (0.1=мало, 0.9=майже норм)</label>
                <input type="number" id="slider-slowmo-speed" min="0.1" max="0.9" step="0.05" value="0.35">
            </div>

            <div class="setting-row" style="border-color: rgba(160,100,255,0.2); background: rgba(120,60,200,0.06);">
                <label style="color: rgba(180,130,255,0.7);">⏱ Тривалість (с)</label>
                <input type="number" id="slider-slowmo-duration" min="0.1" max="2.0" step="0.1" value="0.6">
            </div>

            <div class="setting-row" style="border-color: rgba(160,100,255,0.2); background: rgba(120,60,200,0.06);">
                <label style="color: rgba(180,130,255,0.7);">⏱ Швидкість виходу</label>
                <input type="number" id="slider-slowmo-ease" min="0.5" max="10" step="0.5" value="2.5">
            </div>

            <div class="setting-row" style="grid-column: 1 / -1; border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05);">
                <label style="color: #00d4ff;">⏩ Загальна швидкість гри (1.0 = норма)</label>
                <input type="number" id="slider-global-speed" min="0.1" max="2.0" step="0.1" value="1.0">
            </div>

        </div>
        <button id="btn-back" class="btn btn-secondary" style="margin-top:8px">← НАЗАД</button>
        <p class="tip">Зміни зберігаються автоматично</p>
    </div>

</div>

<!-- Scripts (порядок важливий!) -->
<script src="js/input.js"></script>
<script src="js/entities.js"></script>
<script src="js/bullet.js"></script>
<script src="js/enemy.js"></script>
<script src="js/boss.js"></script>
<script src="js/level.js"></script>
<script src="js/player.js"></script>
<script src="js/main.js"></script>

</body>
</html>
